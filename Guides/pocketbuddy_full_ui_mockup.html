
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --pb-purple:#7F77DD;--pb-purple-l:#EEEDFE;--pb-purple-d:#3C3489;
  --pb-blue:#378ADD;--pb-blue-l:#E6F1FB;--pb-blue-d:#0C447C;
  --pb-lavender:#AFA9EC;--pb-mint:#5DCAA5;--pb-mint-l:#E1F5EE;
  --pb-coral:#D85A30;--pb-coral-l:#FAECE7;--pb-coral-d:#993C1D;
  --pb-amber:#EF9F27;--pb-amber-l:#FAEEDA;
  --pb-gray:#888780;--pb-gray-l:#F1EFE8;
}
body{font-family:var(--font-sans,system-ui);background:transparent}
.app{max-width:390px;margin:0 auto;background:var(--color-background-secondary);border-radius:var(--border-radius-lg);overflow:hidden;border:0.5px solid var(--color-border-tertiary)}
.phone{background:var(--color-background-primary);min-height:600px;position:relative;display:flex;flex-direction:column}
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 16px 6px;font-size:12px;font-weight:500;color:var(--color-text-secondary)}
.header{padding:12px 16px 8px;display:flex;align-items:center;justify-content:space-between}
.greeting{font-size:17px;font-weight:500;color:var(--color-text-primary)}
.greeting-sub{font-size:12px;color:var(--color-text-secondary);margin-top:2px}
.avatar-row{display:flex;align-items:center;gap:10px}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--pb-purple-l);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;color:var(--pb-purple-d)}
.streak{background:var(--pb-amber-l);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:500;color:#633806;display:flex;align-items:center;gap:4px}
.notif{width:32px;height:32px;border-radius:50%;background:var(--color-background-secondary);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary)}

.domain-scroll{display:flex;gap:8px;padding:8px 16px;overflow-x:auto;scrollbar-width:none}
.domain-scroll::-webkit-scrollbar{display:none}
.domain-pill{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:20px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);cursor:pointer;white-space:nowrap;font-size:12px;font-weight:500;color:var(--color-text-secondary);transition:all .15s}
.domain-pill.active{background:var(--pb-purple);border-color:var(--pb-purple);color:#fff}
.domain-pill.fin.active{background:var(--pb-blue);border-color:var(--pb-blue)}
.domain-pill.well.active{background:var(--pb-lavender);border-color:var(--pb-lavender)}
.domain-pill.disc.active{background:var(--pb-coral);border-color:var(--pb-coral)}
.domain-pill.chat.active{background:var(--pb-purple-d);border-color:var(--pb-purple-d)}

.search-bar{margin:6px 16px;display:flex;align-items:center;gap:8px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:20px;padding:8px 14px;font-size:13px;color:var(--color-text-secondary)}
.search-bar i{font-size:16px}

.feat-tabs{display:flex;gap:6px;padding:8px 16px;overflow-x:auto;scrollbar-width:none}
.feat-tabs::-webkit-scrollbar{display:none}
.feat-tab{padding:5px 12px;border-radius:16px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);font-size:11px;font-weight:500;color:var(--color-text-secondary);cursor:pointer;white-space:nowrap;transition:all .15s}
.feat-tab.active{background:var(--active-color,var(--pb-blue));border-color:var(--active-color,var(--pb-blue));color:#fff}

.content{flex:1;padding:0 16px 80px;overflow-y:auto}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px;margin-bottom:10px}
.card-title{font-size:13px;font-weight:500;color:var(--color-text-secondary);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.card-value{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.card-sub{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.metric-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.metric{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px;border:0.5px solid var(--color-border-tertiary)}
.metric-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:4px}
.metric-val{font-size:18px;font-weight:500;color:var(--color-text-primary)}
.metric-badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:10px;margin-top:3px}
.badge-green{background:var(--pb-mint-l);color:#085041}
.badge-amber{background:var(--pb-amber-l);color:#633806}
.badge-red{background:#FCEBEB;color:#501313}
.badge-blue{background:var(--pb-blue-l);color:var(--pb-blue-d)}
.badge-purple{background:var(--pb-purple-l);color:var(--pb-purple-d)}

.progress-wrap{margin-bottom:10px}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
.progress-bar{height:6px;background:var(--color-background-secondary);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .3s}

.insight-card{background:var(--pb-purple-l);border:0.5px solid var(--pb-lavender);border-radius:var(--border-radius-lg);padding:14px;margin-bottom:10px;display:flex;gap:10px;align-items:flex-start}
.insight-icon{font-size:20px;color:var(--pb-purple);margin-top:1px}
.insight-text{font-size:12px;color:var(--pb-purple-d);line-height:1.5;flex:1}
.insight-title{font-size:13px;font-weight:500;color:var(--pb-purple-d);margin-bottom:3px}

.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.quick-btn{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:14px 12px;cursor:pointer;display:flex;flex-direction:column;align-items:flex-start;gap:6px}
.quick-btn i{font-size:20px;color:var(--pb-purple)}
.quick-label{font-size:12px;font-weight:500;color:var(--color-text-primary)}

.list-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.list-item:last-child{border-bottom:none}
.list-icon{width:36px;height:36px;border-radius:var(--border-radius-md);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.list-title{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.list-sub{font-size:11px;color:var(--color-text-secondary)}
.list-right{margin-left:auto;text-align:right}
.list-amount{font-size:13px;font-weight:500;color:var(--color-text-primary)}

.ring-wrap{display:flex;justify-content:center;margin:10px 0}
.ring-outer{position:relative;display:inline-flex;align-items:center;justify-content:center}
.ring-center{text-align:center}
.ring-val{font-size:24px;font-weight:500;color:var(--color-text-primary)}
.ring-lbl{font-size:11px;color:var(--color-text-secondary)}

.chat-container{display:flex;flex-direction:column;height:100%;padding:0}
.chat-header{padding:12px 16px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:10px}
.bot-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.bot-name{font-size:14px;font-weight:500;color:var(--color-text-primary)}
.bot-status{font-size:11px;color:var(--pb-mint);display:flex;align-items:center;gap:4px}
.chat-msgs{flex:1;padding:14px 16px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;min-height:300px}
.msg-bot{align-self:flex-start;max-width:78%}
.msg-user{align-self:flex-end;max-width:78%}
.bubble{padding:10px 13px;border-radius:14px;font-size:13px;line-height:1.5}
.bubble-bot{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary);border-radius:4px 14px 14px 14px}
.bubble-user{color:#fff;border-radius:14px 14px 4px 14px}
.bubble-fin-user{background:var(--pb-blue)}
.bubble-well-user{background:var(--pb-lavender)}
.bubble-disc-user{background:var(--pb-coral)}
.bubble-help-user{background:var(--pb-purple)}
.suggested-prompts{display:flex;flex-wrap:wrap;gap:6px;padding:8px 16px}
.prompt-chip{padding:6px 12px;border-radius:14px;border:0.5px solid var(--color-border-secondary);font-size:11px;color:var(--color-text-secondary);cursor:pointer;background:var(--color-background-primary)}
.chat-input-row{padding:10px 16px 14px;display:flex;gap:8px;align-items:center;border-top:0.5px solid var(--color-border-tertiary)}
.chat-input{flex:1;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:20px;padding:9px 14px;font-size:13px;color:var(--color-text-secondary)}
.send-btn{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;border:none;cursor:pointer}

.ai-card{border-radius:var(--border-radius-md);padding:10px 12px;margin-top:6px;font-size:12px;line-height:1.5}
.ai-card-fin{background:var(--pb-blue-l);border:0.5px solid #B5D4F4;color:var(--pb-blue-d)}
.ai-card-well{background:var(--pb-mint-l);border:0.5px solid #9FE1CB;color:#085041}
.ai-card-disc{background:var(--pb-coral-l);border:0.5px solid #F5C4B3;color:var(--pb-coral-d)}
.ai-card-title{font-size:11px;font-weight:500;margin-bottom:4px;opacity:.85}

.mood-row{display:flex;justify-content:space-between;margin:12px 0}
.mood-btn{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:8px;border-radius:var(--border-radius-md);border:0.5px solid transparent;transition:all .15s}
.mood-btn.active{border-color:var(--pb-purple);background:var(--pb-purple-l)}
.mood-emoji{font-size:26px}
.mood-label{font-size:10px;color:var(--color-text-secondary)}

.slider-wrap{margin:10px 0}
.slider-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--color-text-secondary);margin-bottom:4px}
.slider-val{font-size:12px;font-weight:500;color:var(--pb-purple);text-align:right;margin-top:4px}

.food-card{border-radius:var(--border-radius-md);overflow:hidden;border:0.5px solid var(--color-border-tertiary)}
.food-img{height:90px;background:linear-gradient(135deg,#F5C4B3 0%,#F0997B 100%);display:flex;align-items:center;justify-content:center;font-size:32px}
.food-info{padding:10px}
.food-name{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.food-detail{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.food-price{font-size:13px;font-weight:500;color:var(--pb-coral);margin-top:4px}
.food-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}

.section-title{font-size:14px;font-weight:500;color:var(--color-text-primary);margin:14px 0 8px;display:flex;justify-content:space-between;align-items:center}
.see-all{font-size:11px;color:var(--pb-purple);cursor:pointer}

.wellness-score{display:flex;align-items:center;gap:14px;padding:12px;background:var(--color-background-secondary);border-radius:var(--border-radius-lg);margin-bottom:10px;border:0.5px solid var(--color-border-tertiary)}
.score-circle{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:500;flex-shrink:0}
.score-info{flex:1}
.score-title{font-size:12px;color:var(--color-text-secondary);margin-bottom:2px}
.score-val{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.score-desc{font-size:11px;margin-top:2px}

.bottom-nav{position:sticky;bottom:0;background:var(--color-background-primary);border-top:0.5px solid var(--color-border-tertiary);display:flex;justify-content:space-around;padding:8px 0 12px;z-index:10}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 8px;border-radius:var(--border-radius-md);min-width:44px}
.nav-icon{font-size:20px;color:var(--color-text-secondary)}
.nav-label{font-size:10px;color:var(--color-text-secondary)}
.nav-item.active .nav-icon,.nav-item.active .nav-label{color:var(--active-nav,var(--pb-purple))}

.fab{position:fixed;bottom:80px;right:20px;width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;border:none;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.15)}

.deal-card{background:var(--pb-coral-l);border:0.5px solid #F5C4B3;border-radius:var(--border-radius-md);padding:12px;display:flex;align-items:center;gap:10px;margin-bottom:8px}
.deal-icon{width:44px;height:44px;border-radius:var(--border-radius-md);background:var(--pb-coral);display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;flex-shrink:0}
.deal-title{font-size:13px;font-weight:500;color:var(--pb-coral-d)}
.deal-sub{font-size:11px;color:var(--pb-coral)}

.goal-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px;border:0.5px solid var(--color-border-tertiary);margin-bottom:8px}
.goal-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.goal-name{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.goal-pct{font-size:12px;color:var(--pb-purple);font-weight:500}

.check-in-card{background:var(--pb-purple-l);border-radius:var(--border-radius-lg);padding:16px;margin-bottom:10px;border:0.5px solid var(--pb-lavender)}
.check-in-title{font-size:15px;font-weight:500;color:var(--pb-purple-d);margin-bottom:4px}
.check-in-sub{font-size:12px;color:var(--pb-purple);margin-bottom:12px}

.summary-row{display:flex;gap:8px;margin-bottom:10px}
.summary-chip{flex:1;background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px;text-align:center;border:0.5px solid var(--color-border-tertiary)}
.summary-chip-val{font-size:16px;font-weight:500;color:var(--color-text-primary)}
.summary-chip-lbl{font-size:10px;color:var(--color-text-secondary);margin-top:2px}

.pomodoro{text-align:center;padding:20px 0}
.timer-circle{width:140px;height:140px;border-radius:50%;border:3px solid var(--pb-purple);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 14px}
.timer-time{font-size:32px;font-weight:500;color:var(--color-text-primary)}
.timer-phase{font-size:11px;color:var(--color-text-secondary)}
.timer-btns{display:flex;gap:10px;justify-content:center}
.timer-btn{padding:8px 22px;border-radius:20px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);font-size:13px;font-weight:500;cursor:pointer;color:var(--color-text-primary)}
.timer-btn.primary{background:var(--pb-purple);border-color:var(--pb-purple);color:#fff}

.nav-domain-active-home{--active-nav:#7F77DD}
.nav-domain-active-fin{--active-nav:#378ADD}
.nav-domain-active-well{--active-nav:#AFA9EC}
.nav-domain-active-disc{--active-nav:#D85A30}
.nav-domain-active-chat{--active-nav:#534AB7}

.tab-fin{--active-color:#378ADD}
.tab-well{--active-color:#AFA9EC}
.tab-disc{--active-color:#D85A30}
.tab-home{--active-color:#7F77DD}

.envelope-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.env-color{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.env-name{flex:1;font-size:13px;color:var(--color-text-primary)}
.env-amount{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.env-bar-wrap{margin-top:4px;height:3px;background:var(--color-background-secondary);border-radius:2px;overflow:hidden;width:100%}
.env-bar{height:100%;border-radius:2px}

.burnout-meter{text-align:center;margin:10px 0}
.meter-bar{height:18px;background:var(--color-background-secondary);border-radius:9px;overflow:hidden;margin:8px 0;border:0.5px solid var(--color-border-tertiary)}
.meter-fill{height:100%;border-radius:9px;background:linear-gradient(90deg,#5DCAA5,#EF9F27,#E24B4A)}

.route-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px;margin-bottom:8px;border:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:10px}
.route-icon{width:40px;height:40px;border-radius:var(--border-radius-md);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.route-info{flex:1}
.route-name{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.route-detail{font-size:11px;color:var(--color-text-secondary)}
.route-price{font-size:13px;font-weight:500;color:var(--pb-coral)}

.journal-input{width:100%;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:12px;font-size:13px;color:var(--color-text-secondary);min-height:100px;resize:none;line-height:1.5}
.voice-btn{width:54px;height:54px;border-radius:50%;background:var(--pb-purple);border:none;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;cursor:pointer;margin:10px auto}
</style>

let currentDomain = 'home';
let currentTab = 'Mood Check';

function switchDomain(d){
  currentDomain = d;
  const dom = DOMAINS[d];
  currentTab = dom.tabs[0];
  document.getElementById('greeting-text').textContent = dom.greeting;
  document.getElementById('greeting-sub').textContent = dom.greetingSub;
  document.querySelectorAll('.domain-pill').forEach((el,i)=>{
    el.classList.toggle('active', ['home','fin','well','disc','chat'][i]===d);
  });
  const nav = document.getElementById('bottom-nav');
  nav.className = 'bottom-nav '+dom.navClass;
  document.querySelectorAll('.nav-item').forEach((el,i)=>{
    el.classList.toggle('active', ['home','fin','well','disc','chat'][i]===d);
  });
  renderTabs();
  renderContent();
}

function switchNav(d){ switchDomain(d); }

function renderTabs(){
  const dom = DOMAINS[currentDomain];
  const ft = document.getElementById('feat-tabs');
  ft.className = 'feat-tabs ' + dom.tabClass;
  ft.innerHTML = dom.tabs.map(t=>
    `<div class="feat-tab${t===currentTab?' active':''}" onclick="switchTab('${t}')">${t}</div>`
  ).join('');
}

function switchTab(t){
  currentTab = t;
  renderTabs();
  renderContent();
}

function renderContent(){
  const dom = DOMAINS[currentDomain];
  const fn = dom.screens[currentTab];
  document.getElementById('main-content').innerHTML = fn ? fn() : `<div style="padding:20px;text-align:center;color:var(--color-text-secondary);font-size:13px">Screen coming soon</div>`;
}

function chatbotUI(type,name,tagline,accentColor,bgColor,cardClass,msgPairs,prompts,conv){
  const userBubbleClass = type==='fin'?'bubble-fin-user':type==='well'?'bubble-well-user':type==='disc'?'bubble-disc-user':'bubble-help-user';
  return`
<div class="chat-container">
  <div class="chat-header">
    <div class="bot-avatar" style="background:${bgColor}"><i class="ti ti-robot" style="font-size:18px;color:${accentColor}" aria-hidden="true"></i></div>
    <div><div class="bot-name">${name}</div><div class="bot-status"><span style="width:6px;height:6px;border-radius:50%;background:var(--pb-mint);display:inline-block"></span> Online</div></div>
    <i class="ti ti-dots" style="font-size:18px;color:var(--color-text-secondary);margin-left:auto;cursor:pointer" aria-hidden="true"></i>
  </div>
  <div class="chat-msgs">
    <div style="font-size:11px;color:var(--color-text-secondary);text-align:center;margin-bottom:6px">Today · ${name}</div>
    ${msgPairs.map(([b1,b2])=>`
    <div class="msg-bot">
      <div class="bubble bubble-bot">${b1}</div>
      ${b2?`<div class="bubble bubble-bot" style="margin-top:4px">${b2}</div>`:''}
    </div>`).join('')}
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin:4px 0">
      ${prompts.map(p=>`<div class="prompt-chip">${p}</div>`).join('')}
    </div>
    ${conv.map(c=>`
    <div class="msg-user"><div class="bubble bubble-user ${userBubbleClass}">${c.q}</div></div>
    <div class="msg-bot">
      <div class="bubble bubble-bot" style="white-space:pre-line">${c.a}</div>
      ${c.card?`<div class="ai-card ${cardClass||'ai-card-fin'}"><div class="ai-card-title">${c.card.title}</div>${c.card.body}</div>`:''}
    </div>`).join('')}
  </div>
  <div class="suggested-prompts">
    ${prompts.slice(0,3).map(p=>`<div class="prompt-chip">${p}</div>`).join('')}
  </div>
  <div class="chat-input-row">
    <i class="ti ti-microphone" style="font-size:20px;color:var(--color-text-secondary);cursor:pointer" aria-hidden="true"></i>
    <div class="chat-input">Type a message…</div>
    <button class="send-btn" style="background:${accentColor}"><i class="ti ti-send" style="font-size:16px" aria-hidden="true"></i></button>
  </div>
</div>
`}
