# Nginx reverse proxy for PocketBuddy backend
# Handles: HTTP → Uvicorn, CORS headers, SSE streaming support

server {
    listen 80;
    server_name _;

    # Allow large request bodies (file uploads, etc.)
    client_max_body_size 10M;

    # Backend API - proxy to Uvicorn
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE streaming support (critical for /api/chat/* endpoints)
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # Long timeout for streaming chat responses
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
    }
}
